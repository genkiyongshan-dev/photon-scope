<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PHOTON SCOPE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:#0d0d0d;overflow:hidden;font-family:'Space Mono',monospace}

  #startScreen{
    position:fixed;top:36px;left:0;right:0;bottom:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;z-index:99;background:#0d0d0d;gap:14px;
  }
  #startBtn{
    background:transparent;border:1px solid rgba(255,255,255,.3);color:#fff;
    font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.35em;
    padding:18px 44px;cursor:pointer;
  }
  .sub{font-size:8px;letter-spacing:.3em;color:rgba(255,255,255,.2)}

  #sourceBar{
    position:fixed;top:0;left:0;right:0;height:36px;
    background:#161616;border-bottom:1px solid rgba(255,255,255,.08);
    display:flex;align-items:center;z-index:20;
  }
  .stab{
    flex:1;height:100%;background:transparent;border:none;
    color:rgba(255,255,255,.28);font-family:'Space Mono',monospace;
    font-size:9px;letter-spacing:.3em;cursor:pointer;text-transform:uppercase;
    border-bottom:2px solid transparent;
  }
  .stab.on{color:rgba(255,255,255,.85);border-bottom:2px solid rgba(255,255,255,.5)}

  #pvWrap{position:fixed;left:0;right:0;background:#000;overflow:hidden}
  #video{width:100%;height:100%;object-fit:cover;display:block}

  #photoWrap{
    position:fixed;left:0;right:0;background:#000;overflow:hidden;
    display:none;align-items:center;justify-content:center;
  }
  #photoImg{max-width:100%;max-height:100%;object-fit:contain;display:block}
  #photoDropzone{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:8px;cursor:pointer;
  }
  #photoDropzone.hidden{display:none}
  #fileInput{display:none}
  .dropIcon{font-size:28px;opacity:.35}
  .dropLabel{font-size:8px;letter-spacing:.3em;color:rgba(255,255,255,.3)}
  .dropBtn{
    margin-top:4px;background:transparent;border:1px solid rgba(255,255,255,.2);
    color:rgba(255,255,255,.5);font-family:'Space Mono',monospace;
    font-size:8px;letter-spacing:.25em;padding:8px 20px;cursor:pointer;
  }

  .pvLabel{position:absolute;top:8px;left:14px;font-size:8px;letter-spacing:.3em;color:rgba(255,255,255,.35)}
  .rec{position:absolute;top:11px;left:8px;width:5px;height:5px;border-radius:50%;
    background:#f02020;animation:blink 1.4s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}

  #changePhotoBtn{
    position:absolute;top:8px;right:8px;
    background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.2);
    color:rgba(255,255,255,.6);font-family:'Space Mono',monospace;
    font-size:7px;letter-spacing:.2em;padding:4px 10px;cursor:pointer;display:none;
  }

  #scopeWrap{position:fixed;left:0;right:0;background:#0d0d0d;overflow:hidden}
  .hdr{
    position:absolute;top:0;left:0;right:0;height:26px;
    background:#1a1a1a;border-bottom:1px solid rgba(255,255,255,.08);
    display:flex;align-items:center;padding:0 10px;z-index:5;
  }
  .hdrTitle{font-size:8px;letter-spacing:.28em;color:rgba(255,255,255,.5)}
  .modes{margin-left:auto;display:flex;gap:4px;align-items:center}
  #saveBtn{
    background:transparent;border:1px solid rgba(255,255,255,.15);
    color:rgba(255,255,255,.4);font-family:'Space Mono',monospace;
    font-size:7px;letter-spacing:.15em;padding:2px 8px;cursor:pointer;
    border-radius:2px;margin-right:8px;transition:color .2s,border-color .2s;
  }
  #saveBtn:active{color:rgba(255,255,255,.9);border-color:rgba(255,255,255,.5)}
  .mb{
    background:transparent;border:none;color:rgba(255,255,255,.25);
    font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.28em;
    cursor:pointer;padding:3px 8px;text-transform:uppercase;border-radius:2px;
  }
  .mb.on{color:rgba(255,255,255,.9);background:rgba(255,255,255,.1)}
  #gc,#wc{position:absolute;top:26px;left:0}
  .yAxis{position:absolute;top:26px;left:0;width:34px;pointer-events:none;z-index:4}
  .yL{position:absolute;right:5px;font-size:7px;color:rgba(255,255,255,.3);transform:translateY(-50%)}
  .ftr{
    position:absolute;bottom:0;left:0;right:0;height:18px;
    display:flex;align-items:center;padding:0 10px;
    border-top:1px solid rgba(255,255,255,.05);z-index:4;
  }
  .ftrL{font-size:7px;letter-spacing:.3em;color:rgba(255,255,255,.2)}
  .ftrR{margin-left:auto;font-size:7px;letter-spacing:.2em;color:rgba(255,255,255,.12)}

  #saveFlash{
    position:absolute;inset:0;background:rgba(255,255,255,.15);
    pointer-events:none;opacity:0;transition:opacity .3s;z-index:10;
  }
  #saveFlash.flash{opacity:1}

  #controls{
    position:fixed;left:0;right:0;bottom:0;background:#111;
    border-top:1px solid rgba(255,255,255,.07);
    overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding:10px 24px 20px;
  }
  .ctrl-grid{display:flex;flex-wrap:wrap;gap:8px 16px}
  .ctrl-row{flex:1 1 calc(50% - 8px);min-width:120px;display:flex;flex-direction:column;gap:3px}
  .ctrl-head{display:flex;justify-content:space-between;align-items:baseline}
  .ctrl-name{font-size:7px;letter-spacing:.25em;color:rgba(255,255,255,.35)}
  .ctrl-val{font-size:11px;font-weight:700;letter-spacing:.05em;color:rgba(255,255,255,.7)}
  input[type=range]{
    width:100%;-webkit-appearance:none;appearance:none;
    height:2px;background:rgba(255,255,255,.15);border-radius:2px;outline:none;cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:20px;height:20px;border-radius:50%;
    background:#fff;cursor:pointer;box-shadow:0 0 6px rgba(255,255,255,.2);
  }
</style>
</head>
<body>

<div id="startScreen">
  <button id="startBtn">▶ START SCOPE</button>
  <div class="sub">PHOTON SCOPE · RGB OVERLAY WAVEFORM</div>
</div>

<div id="sourceBar" style="display:flex">
  <button class="stab on" data-s="camera">◉ CAMERA</button>
  <button class="stab" data-s="photo">⊞ PHOTO</button>
</div>

<div id="pvWrap">
  <video id="video" autoplay playsinline muted></video>
  <div class="rec"></div>
  <div class="pvLabel">CAMERA INPUT</div>
</div>

<div id="photoWrap">
  <img id="photoImg" style="display:none">
  <div id="photoDropzone">
    <div class="dropIcon">⊞</div>
    <div class="dropLabel">PHOTO ANALYSIS</div>
    <button class="dropBtn" id="openFileBtn">SELECT IMAGE</button>
  </div>
  <button id="changePhotoBtn">CHANGE IMAGE</button>
  <input type="file" id="fileInput" accept="image/*">
</div>

<div id="scopeWrap">
  <div class="hdr">
    <span class="hdrTitle" id="hdrTitle">RGB OVERLAY</span>
    <div class="modes">
      <button id="saveBtn">SAVE</button>
      <button class="mb" data-m="luma">LUMA</button>
      <button class="mb on" data-m="rgb">RGB</button>
      <button class="mb" data-m="color">COLOR</button>
    </div>
  </div>
  <canvas id="gc"></canvas>
  <canvas id="wc"></canvas>
  <div id="saveFlash"></div>
  <div class="yAxis" id="yAxis"></div>
  <div class="ftr">
    <span class="ftrL">Rec. 709</span>
    <span class="ftrR" id="fps"></span>
  </div>
</div>

<div id="controls">
  <div class="ctrl-grid">
    <div class="ctrl-row">
      <div class="ctrl-head">
        <span class="ctrl-name">GAIN</span>
        <span class="ctrl-val" id="gainVal">160</span>
      </div>
      <input type="range" id="gainSlider" min="20" max="600" value="160" step="5">
    </div>
    <div class="ctrl-row">
      <div class="ctrl-head">
        <span class="ctrl-name">DECAY</span>
        <span class="ctrl-val" id="decayVal">0.72</span>
      </div>
      <input type="range" id="decaySlider" min="0" max="97" value="72" step="1">
    </div>
    <div class="ctrl-row">
      <div class="ctrl-head">
        <span class="ctrl-name">GAMMA</span>
        <span class="ctrl-val" id="gammaVal">0.55</span>
      </div>
      <input type="range" id="gammaSlider" min="20" max="100" value="55" step="5">
    </div>
    <div class="ctrl-row">
      <div class="ctrl-head">
        <span class="ctrl-name">COLOR MIX</span>
        <span class="ctrl-val" id="cmixVal">0.30</span>
      </div>
      <input type="range" id="cmixSlider" min="0" max="60" value="30" step="5">
    </div>
  </div>
</div>

<canvas id="ac" style="display:none"></canvas>
<canvas id="saveCanvas" style="display:none"></canvas>

<script>
try {

var video    = document.getElementById('video');
var photoImg = document.getElementById('photoImg');
var photoWrap= document.getElementById('photoWrap');
var pvWrap   = document.getElementById('pvWrap');
var ac = document.getElementById('ac');
var gc = document.getElementById('gc');
var wc = document.getElementById('wc');
var gx = gc.getContext('2d');
var wx = wc.getContext('2d');
var ax = ac.getContext('2d',{willReadFrequently:true});

var DPR = window.devicePixelRatio || 1;

var AH_CAMERA = 240;  /* Camera: fixed at 240 for performance */
var AH = AH_CAMERA;

var GAIN_NUMER = 160;
var DECAY      = 0.72;
var GAMMA      = 0.55;
var CMIX       = 0.30;
var PAD_T=8, PAD_B=22, PAD_L=34, PAD_R=4, HDR=26, TABH=36;

var mode='rgb', source='camera';
var running=false, photoLoaded=false;
var lastT=performance.now();

var W=0, H=0, pW=0, pH=0, AW=1;
var cssW=0, cssH=0;
var sPAD_T=0, sPAD_B=0, sPAD_L=0, sPAD_R=0;

/* FIX #3: Photo aspect ratio tracking */
var photoAspect = 1;       /* width / height of loaded photo */
var plotOffsetX = 0;       /* physical pixel offset for centered waveform */
var plotActiveW = 0;       /* active plot width in physical pixels */

/* FIX #4: High-res save multiplier for photo mode */
var SAVE_MULT = 2;         /* Save at 2x DPR resolution in photo mode */

var pxR=null, pxG=null, pxB=null, pxL=null;
var densR=null, densG=null, densB=null;
var persR=null, persG=null, persB=null;

var gammaLUT = new Uint8Array(256);
function buildGammaLUT(){
  for(var i=0;i<256;i++){
    gammaLUT[i] = Math.round(255 * Math.pow(i/255, GAMMA));
  }
}
buildGammaLUT();

// ── Sliders ───────────────────────────────────────────────
document.getElementById('gainSlider').addEventListener('input', function(){
  GAIN_NUMER = +this.value;
  document.getElementById('gainVal').textContent = this.value;
  clearPers();
  if(source==='photo'&&photoLoaded) analyzePhoto();
});
document.getElementById('decaySlider').addEventListener('input', function(){
  DECAY = this.value/100;
  document.getElementById('decayVal').textContent = DECAY.toFixed(2);
  clearPers();
  if(source==='photo'&&photoLoaded) analyzePhoto();
});
document.getElementById('gammaSlider').addEventListener('input', function(){
  GAMMA = this.value/100;
  document.getElementById('gammaVal').textContent = GAMMA.toFixed(2);
  buildGammaLUT();
  clearPers();
  if(source==='photo'&&photoLoaded) analyzePhoto();
});
document.getElementById('cmixSlider').addEventListener('input', function(){
  CMIX = this.value/100;
  document.getElementById('cmixVal').textContent = CMIX.toFixed(2);
  clearPers();
  if(source==='photo'&&photoLoaded) analyzePhoto();
});

function clearPers(){
  if(persR){ persR.fill(0); persG.fill(0); persB.fill(0); }
}

// ── Source tabs ───────────────────────────────────────────
document.querySelectorAll('.stab').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.stab').forEach(function(b){b.classList.remove('on');});
    btn.classList.add('on');
    source = btn.dataset.s;
    switchSource();
  });
});

function switchSource(){
  clearPers();
  if(source==='camera'){
    pvWrap.style.display='block';
    photoWrap.style.display='none';
    document.getElementById('fps').textContent='';
  } else {
    pvWrap.style.display='none';
    photoWrap.style.display='flex';
    running=false;
  }
  layout();
  if(source==='camera' && !running){
    running=true;
    requestAnimationFrame(loop);
  }
  if(source==='photo' && photoLoaded){
    analyzePhoto();
  }
}

// ── File picker ───────────────────────────────────────────
document.getElementById('openFileBtn').addEventListener('click',function(){
  document.getElementById('fileInput').click();
});
document.getElementById('changePhotoBtn').addEventListener('click',function(){
  document.getElementById('fileInput').click();
});
document.getElementById('fileInput').addEventListener('change', function(){
  if(!this.files||!this.files[0]) return;
  var url = URL.createObjectURL(this.files[0]);
  photoImg.onload = function(){
    photoLoaded=true;
    /* FIX #3: capture photo aspect ratio */
    var iw = photoImg.naturalWidth;
    var ih = photoImg.naturalHeight;
    if(ih > 0) photoAspect = iw / ih;
    else photoAspect = 1;

    document.getElementById('photoDropzone').classList.add('hidden');
    photoImg.style.display='block';
    document.getElementById('changePhotoBtn').style.display='block';

    /* Re-layout to recalculate AW/AH for new aspect ratio */
    layout();
    clearPers();
    analyzePhoto();
  };
  photoImg.src = url;
});

function analyzePhoto(){
  if(!photoLoaded||W===0||H===0||AW<1||AH<1) return;

  ax.fillStyle='#000';
  ax.fillRect(0,0,AW,AH);

  var iw=photoImg.naturalWidth, ih=photoImg.naturalHeight;
  if(iw===0||ih===0) return;

  /* Draw image filling AW×AH (aspect already matched in resizeScope) */
  ax.drawImage(photoImg, 0, 0, AW, AH);

  var d=ax.getImageData(0,0,AW,AH).data;
  var total=AW*AH;
  for(var i=0;i<total;i++){
    var b=i*4;
    pxR[i]=d[b]; pxG[i]=d[b+1]; pxB[i]=d[b+2];
    pxL[i]=(d[b]*299+d[b+1]*587+d[b+2]*114+500)/1000|0;
  }

  densR.fill(0); densG.fill(0); densB.fill(0);
  buildDensityPhoto();

  var GAIN = GAIN_NUMER / AH;
  var steady = 1 / (1 - Math.min(DECAY, 0.995));
  var sz = W*H;
  var imgData = new ImageData(W,H);
  var buf = imgData.data;
  for(var i=0;i<sz;i++){
    var r = densR[i]*GAIN*steady;
    var g = densG[i]*GAIN*steady;
    var bb = densB[i]*GAIN*steady;
    var bi=i*4;
    var ri = r>255?255: r<0?0: r|0;
    var gi = g>255?255: g<0?0: g|0;
    var bbi= bb>255?255: bb<0?0: bb|0;
    buf[bi]  = gammaLUT[ri];
    buf[bi+1]= gammaLUT[gi];
    buf[bi+2]= gammaLUT[bbi];
    buf[bi+3]= 255;
  }
  wx.putImageData(imgData,0,0);
}

// ── Save waveform as PNG ──────────────────────────────────
document.getElementById('saveBtn').addEventListener('click', saveWaveform);

function saveWaveform(){
  var flash = document.getElementById('saveFlash');
  flash.classList.add('flash');
  setTimeout(function(){ flash.classList.remove('flash'); }, 200);

  /*
   * FIX #4: High-resolution SAVE
   * Camera mode: save at current W×H (DPR resolution) — same as before
   * Photo mode: re-render at SAVE_MULT × W×H for much higher resolution
   *   so pinch-zoom on the saved PNG stays sharp
   */
  if(source==='photo' && photoLoaded){
    savePhotoHighRes();
  } else {
    saveCurrent();
  }
}

/* Save at current canvas resolution (camera mode) */
function saveCurrent(){
  var sc = document.getElementById('saveCanvas');
  var sx = sc.getContext('2d');
  sc.width = W; sc.height = H;
  sx.fillStyle = '#0d0d0d';
  sx.fillRect(0,0,W,H);
  sx.drawImage(gc, 0, 0);
  sx.drawImage(wc, 0, 0);
  downloadCanvas(sc);
}

/* FIX #4: Re-render waveform at higher resolution for photo mode */
function savePhotoHighRes(){
  var SM = SAVE_MULT;
  var sW = W * SM;
  var sH = H * SM;
  var spW = pW * SM;
  var spH = pH * SM;
  var ssPAD_T = sPAD_T * SM;
  var ssPAD_B = sPAD_B * SM;
  var ssPAD_L = sPAD_L * SM;
  var ssPAD_R = sPAD_R * SM;

  /* High-res analysis canvas */
  var sAW = plotActiveW * SM;
  var sAH = Math.max(Math.round(spH * 2), 2);
  var sPlotOffsetX = plotOffsetX * SM;

  /* Re-sample image at high res */
  var hac = document.createElement('canvas');
  hac.width = sAW; hac.height = sAH;
  var hax = hac.getContext('2d', {willReadFrequently:true});
  hax.drawImage(photoImg, 0, 0, sAW, sAH);

  var d = hax.getImageData(0,0,sAW,sAH).data;
  var total = sAW * sAH;
  var sPxR = new Uint8Array(total);
  var sPxG = new Uint8Array(total);
  var sPxB = new Uint8Array(total);
  var sPxL = new Uint8Array(total);
  for(var i=0;i<total;i++){
    var b=i*4;
    sPxR[i]=d[b]; sPxG[i]=d[b+1]; sPxB[i]=d[b+2];
    sPxL[i]=(d[b]*299+d[b+1]*587+d[b+2]*114+500)/1000|0;
  }

  /* Build density at high res */
  var sz = sW * sH;
  var sDensR = new Float32Array(sz);
  var sDensG = new Float32Array(sz);
  var sDensB = new Float32Array(sz);

  function sAddSubpixel(outX, fy, cr, cg, cb){
    var y0 = fy|0;
    var y1 = y0+1;
    var frac = fy-y0;
    var w0 = 1.0-frac;
    var w1 = frac;
    if(y0>=0&&y0<sH){
      var oi=y0*sW+outX;
      sDensR[oi]+=cr*w0; sDensG[oi]+=cg*w0; sDensB[oi]+=cb*w0;
    }
    if(y1>=0&&y1<sH){
      var oi2=y1*sW+outX;
      sDensR[oi2]+=cr*w1; sDensG[oi2]+=cg*w1; sDensB[oi2]+=cb*w1;
    }
  }

  for(var col=0; col<sAW; col++){
    var outX = ssPAD_L + sPlotOffsetX + col;
    if(outX<0||outX>=sW) continue;
    for(var row=0; row<sAH; row++){
      var idx = row*sAW+col;
      if(mode==='luma'){
        var v = sPxL[idx];
        var fy = ssPAD_T+(1-v/255)*spH;
        sAddSubpixel(outX, fy, 0.75, 1.0, 0.55);
      } else if(mode==='rgb'){
        var r=sPxR[idx], g=sPxG[idx], bl=sPxB[idx];
        sAddSubpixel(outX, ssPAD_T+(1-r/255)*spH, 1.0, 0.0, 0.0);
        sAddSubpixel(outX, ssPAD_T+(1-g/255)*spH, 0.0, 1.0, 0.0);
        sAddSubpixel(outX, ssPAD_T+(1-bl/255)*spH, 0.0, 0.0, 1.0);
      } else {
        var r2=sPxR[idx], g2=sPxG[idx], bl2=sPxB[idx];
        var v2=sPxL[idx];
        var rn=r2/255, gn=g2/255, bn=bl2/255;
        var fy2 = ssPAD_T+(1-v2/255)*spH;
        sAddSubpixel(outX, fy2, rn, gn, bn);
        if(CMIX > 0){
          var fyR = ssPAD_T+(1-r2/255)*spH;
          var fyG = ssPAD_T+(1-g2/255)*spH;
          var fyB = ssPAD_T+(1-bl2/255)*spH;
          var thr = 1.5*DPR*SM;
          if(Math.abs(fyR-fy2) > thr) sAddSubpixel(outX, fyR, rn*CMIX, 0, 0);
          if(Math.abs(fyG-fy2) > thr) sAddSubpixel(outX, fyG, 0, gn*CMIX, 0);
          if(Math.abs(fyB-fy2) > thr) sAddSubpixel(outX, fyB, 0, 0, bn*CMIX);
        }
      }
    }
  }

  /* Render to high-res image */
  var GAIN = GAIN_NUMER / sAH;
  var steady = 1 / (1 - Math.min(DECAY, 0.995));
  var imgData = new ImageData(sW, sH);
  var buf = imgData.data;
  for(var i=0;i<sz;i++){
    var r = sDensR[i]*GAIN*steady;
    var g = sDensG[i]*GAIN*steady;
    var bb = sDensB[i]*GAIN*steady;
    var bi=i*4;
    var ri = r>255?255: r<0?0: r|0;
    var gi = g>255?255: g<0?0: g|0;
    var bbi= bb>255?255: bb<0?0: bb|0;
    buf[bi]  = gammaLUT[ri];
    buf[bi+1]= gammaLUT[gi];
    buf[bi+2]= gammaLUT[bbi];
    buf[bi+3]= 255;
  }

  /* Compose: waveform first (putImageData replaces all pixels), then grid on top */
  var sc = document.getElementById('saveCanvas');
  var sx = sc.getContext('2d');
  sc.width = sW; sc.height = sH;

  /* Waveform data (putImageData replaces canvas content) */
  sx.putImageData(imgData, 0, 0);

  /* Grid lines on top of waveform */
  sx.lineWidth = DPR * SM;
  var gridVals = [0,25,50,75,100];
  for(var gi2=0; gi2<gridVals.length; gi2++){
    var v = gridVals[gi2];
    var y = ssPAD_T+(1-v/100)*spH;
    sx.strokeStyle = (v===0||v===100)?'rgba(255,255,255,.1)':'rgba(255,255,255,.05)';
    sx.beginPath(); sx.moveTo(ssPAD_L,y); sx.lineTo(sW-ssPAD_R,y); sx.stroke();
  }

  downloadCanvas(sc);

  /* Clean up */
  sDensR = null; sDensG = null; sDensB = null;
  sPxR = null; sPxG = null; sPxB = null; sPxL = null;
}

function downloadCanvas(canvas){
  canvas.toBlob(function(blob){
    if(!blob) return;
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    var ts = new Date();
    var stamp = ts.getFullYear()+
      String(ts.getMonth()+1).padStart(2,'0')+
      String(ts.getDate()).padStart(2,'0')+'_'+
      String(ts.getHours()).padStart(2,'0')+
      String(ts.getMinutes()).padStart(2,'0')+
      String(ts.getSeconds()).padStart(2,'0');
    a.download = 'photon-scope_'+mode+'_'+stamp+'.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 'image/png');
}

// ── Layout ────────────────────────────────────────────────
function layout(){
  var SW=window.innerWidth, SH=window.innerHeight;
  var panelH=Math.floor(SW*9/16);
  var pvTop=TABH;

  pvWrap.style.top=pvTop+'px';    pvWrap.style.height=panelH+'px';
  photoWrap.style.top=pvTop+'px'; photoWrap.style.height=panelH+'px';

  var scopeTop=pvTop+panelH;
  var scopeEl=document.getElementById('scopeWrap');
  scopeEl.style.top=scopeTop+'px'; scopeEl.style.height=panelH+'px';

  var ctrlTop=scopeTop+panelH;
  var ctrlH=SH-ctrlTop;
  var ctrl=document.getElementById('controls');
  ctrl.style.top=ctrlTop+'px';
  ctrl.style.height=Math.max(0,ctrlH)+'px';

  resizeScope(SW,panelH);
}

function resizeScope(sw,sh){
  cssW=sw; cssH=sh-HDR;
  if(cssW<=0||cssH<=0) return;

  W = Math.round(cssW * DPR);
  H = Math.round(cssH * DPR);

  sPAD_T = Math.round(PAD_T * DPR);
  sPAD_B = Math.round(PAD_B * DPR);
  sPAD_L = Math.round(PAD_L * DPR);
  sPAD_R = Math.round(PAD_R * DPR);

  pW = W - sPAD_L - sPAD_R;
  pH = H - sPAD_T - sPAD_B;

  if(pW<1) pW=1;
  if(pH<1) pH=1;

  gc.width=W; gc.height=H;
  gc.style.width=cssW+'px'; gc.style.height=cssH+'px';
  wc.width=W; wc.height=H;
  wc.style.width=cssW+'px'; wc.style.height=cssH+'px';

  /*
   * FIX #1: Banding fix — photo AH = pH * 2 for high sample density
   * FIX #3: Aspect ratio — fit photo aspect into pW × pH plot area
   * Camera: AW = pW, AH = 240 (unchanged for performance)
   */
  if(source==='photo' && photoLoaded){
    /* Fit photo aspect ratio within the pW × pH plot area */
    var fitW, fitH;
    if(photoAspect >= pW / pH){
      /* Photo is wider or equal — fit to width */
      fitW = pW;
      fitH = Math.round(pW / photoAspect);
    } else {
      /* Photo is taller — fit to height */
      fitH = pH;
      fitW = Math.round(pH * photoAspect);
    }
    plotActiveW = fitW;
    plotOffsetX = Math.round((pW - fitW) / 2);

    AW = fitW;
    /* FIX #1: AH = pH * 2 — enough samples for smooth subpixel interpolation */
    AH = Math.max(Math.round(pH * 2), 2);
  } else {
    /* Camera mode — unchanged */
    plotActiveW = pW;
    plotOffsetX = 0;
    AW = pW;
    AH = AH_CAMERA;
  }

  ac.width=AW; ac.height=AH;

  var sz=W*H;
  var asz=AW*AH;
  pxR=new Uint8Array(asz); pxG=new Uint8Array(asz);
  pxB=new Uint8Array(asz); pxL=new Uint8Array(asz);
  densR=new Float32Array(sz); densG=new Float32Array(sz); densB=new Float32Array(sz);
  persR=new Float32Array(sz); persG=new Float32Array(sz); persB=new Float32Array(sz);

  buildYAxis(); drawGrid();
}

function buildYAxis(){
  var el=document.getElementById('yAxis'); el.innerHTML='';
  var cssPH = cssH - PAD_T - PAD_B;
  if(cssPH<=0) return;
  [100,75,50,25,0].forEach(function(v){
    var d=document.createElement('div');
    d.className='yL'; d.textContent=v;
    d.style.top=(PAD_T+(1-v/100)*cssPH)+'px';
    el.appendChild(d);
  });
}
function drawGrid(){
  if(W<=0||H<=0) return;
  gx.clearRect(0,0,W,H);
  gx.lineWidth=DPR;
  [0,25,50,75,100].forEach(function(v){
    var y=sPAD_T+(1-v/100)*pH;
    gx.strokeStyle=(v===0||v===100)?'rgba(255,255,255,.1)':'rgba(255,255,255,.05)';
    gx.beginPath(); gx.moveTo(sPAD_L,y); gx.lineTo(W-sPAD_R,y); gx.stroke();
  });
}

function analyze(){
  ax.drawImage(video,0,0,AW,AH);
  var d=ax.getImageData(0,0,AW,AH).data;
  var total=AW*AH;
  for(var i=0;i<total;i++){
    var b=i*4;
    pxR[i]=d[b]; pxG[i]=d[b+1]; pxB[i]=d[b+2];
    pxL[i]=(d[b]*299+d[b+1]*587+d[b+2]*114+500)/1000|0;
  }
}

function addSubpixel(outX, fy, cr, cg, cb){
  var y0 = fy|0;
  var y1 = y0+1;
  var frac = fy-y0;
  var w0 = 1.0-frac;
  var w1 = frac;
  if(y0>=0&&y0<H){
    var oi=y0*W+outX;
    densR[oi]+=cr*w0; densG[oi]+=cg*w0; densB[oi]+=cb*w0;
  }
  if(y1>=0&&y1<H){
    var oi2=y1*W+outX;
    densR[oi2]+=cr*w1; densG[oi2]+=cg*w1; densB[oi2]+=cb*w1;
  }
}

/* Camera mode density: AW = pW, no horizontal offset */
function buildDensity(){
  densR.fill(0); densG.fill(0); densB.fill(0);

  for(var col=0; col<AW; col++){
    var outX = sPAD_L + col;
    if(outX<0||outX>=W) continue;

    for(var row=0; row<AH; row++){
      var idx = row*AW+col;

      if(mode==='luma'){
        var v = pxL[idx];
        var fy = sPAD_T+(1-v/255)*pH;
        addSubpixel(outX, fy, 0.75, 1.0, 0.55);

      } else if(mode==='rgb'){
        var r=pxR[idx], g=pxG[idx], bl=pxB[idx];
        addSubpixel(outX, sPAD_T+(1-r/255)*pH, 1.0, 0.0, 0.0);
        addSubpixel(outX, sPAD_T+(1-g/255)*pH, 0.0, 1.0, 0.0);
        addSubpixel(outX, sPAD_T+(1-bl/255)*pH, 0.0, 0.0, 1.0);

      } else {
        var r2=pxR[idx], g2=pxG[idx], bl2=pxB[idx];
        var v2=pxL[idx];
        var rn=r2/255, gn=g2/255, bn=bl2/255;

        var fy2 = sPAD_T+(1-v2/255)*pH;
        addSubpixel(outX, fy2, rn, gn, bn);

        if(CMIX > 0){
          var fyR = sPAD_T+(1-r2/255)*pH;
          var fyG = sPAD_T+(1-g2/255)*pH;
          var fyB = sPAD_T+(1-bl2/255)*pH;
          var thr = 1.5*DPR;
          if(Math.abs(fyR-fy2) > thr) addSubpixel(outX, fyR, rn*CMIX, 0, 0);
          if(Math.abs(fyG-fy2) > thr) addSubpixel(outX, fyG, 0, gn*CMIX, 0);
          if(Math.abs(fyB-fy2) > thr) addSubpixel(outX, fyB, 0, 0, bn*CMIX);
        }
      }
    }
  }
}

/*
 * FIX #3: Photo mode density with aspect-aware horizontal offset
 * The waveform is centered within the plot area, matching the photo's aspect ratio
 */
function buildDensityPhoto(){
  densR.fill(0); densG.fill(0); densB.fill(0);

  for(var col=0; col<AW; col++){
    var outX = sPAD_L + plotOffsetX + col;
    if(outX<0||outX>=W) continue;

    for(var row=0; row<AH; row++){
      var idx = row*AW+col;

      if(mode==='luma'){
        var v = pxL[idx];
        var fy = sPAD_T+(1-v/255)*pH;
        addSubpixel(outX, fy, 0.75, 1.0, 0.55);

      } else if(mode==='rgb'){
        var r=pxR[idx], g=pxG[idx], bl=pxB[idx];
        addSubpixel(outX, sPAD_T+(1-r/255)*pH, 1.0, 0.0, 0.0);
        addSubpixel(outX, sPAD_T+(1-g/255)*pH, 0.0, 1.0, 0.0);
        addSubpixel(outX, sPAD_T+(1-bl/255)*pH, 0.0, 0.0, 1.0);

      } else {
        var r2=pxR[idx], g2=pxG[idx], bl2=pxB[idx];
        var v2=pxL[idx];
        var rn=r2/255, gn=g2/255, bn=bl2/255;

        var fy2 = sPAD_T+(1-v2/255)*pH;
        addSubpixel(outX, fy2, rn, gn, bn);

        if(CMIX > 0){
          var fyR = sPAD_T+(1-r2/255)*pH;
          var fyG = sPAD_T+(1-g2/255)*pH;
          var fyB = sPAD_T+(1-bl2/255)*pH;
          var thr = 1.5*DPR;
          if(Math.abs(fyR-fy2) > thr) addSubpixel(outX, fyR, rn*CMIX, 0, 0);
          if(Math.abs(fyG-fy2) > thr) addSubpixel(outX, fyG, 0, gn*CMIX, 0);
          if(Math.abs(fyB-fy2) > thr) addSubpixel(outX, fyB, 0, 0, bn*CMIX);
        }
      }
    }
  }
}

function drawScope(){
  if(!persR||W===0||H===0) return;
  var GAIN=GAIN_NUMER/AH;
  var sz=W*H;
  var imgData=new ImageData(W,H);
  var buf=imgData.data;
  for(var i=0;i<sz;i++){
    persR[i]=persR[i]*DECAY+densR[i]*GAIN;
    persG[i]=persG[i]*DECAY+densG[i]*GAIN;
    persB[i]=persB[i]*DECAY+densB[i]*GAIN;
    var b=i*4;
    var ri = persR[i]>255?255: persR[i]<0?0: persR[i]|0;
    var gi = persG[i]>255?255: persG[i]<0?0: persG[i]|0;
    var bi = persB[i]>255?255: persB[i]<0?0: persB[i]|0;
    buf[b]   = gammaLUT[ri];
    buf[b+1] = gammaLUT[gi];
    buf[b+2] = gammaLUT[bi];
    buf[b+3] = 255;
  }
  wx.putImageData(imgData,0,0);
}

document.querySelectorAll('.mb').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.mb').forEach(function(b){b.classList.remove('on');});
    btn.classList.add('on');
    mode=btn.dataset.m;
    document.getElementById('hdrTitle').textContent=
      mode==='luma'?'LUMA': mode==='rgb'?'RGB OVERLAY':'COLOR';
    clearPers();
    if(source==='photo'&&photoLoaded) analyzePhoto();
  });
});

// ── Start ─────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', function(){
  navigator.mediaDevices.getUserMedia({
    video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},
    audio:false
  }).then(function(stream){
    video.srcObject=stream;
    video.onloadedmetadata=function(){
      video.play().then(function(){
        document.getElementById('startScreen').style.display='none';
        layout();
        running=true;
        requestAnimationFrame(loop);
      });
    };
  }).catch(function(e){
    document.querySelector('.sub').textContent='カメラを許可してください';
  });
});

window.addEventListener('resize', layout);

/* Run layout once on load so UI elements are positioned */
layout();

function loop(){
  if(!running||source!=='camera') return;
  var now=performance.now();
  document.getElementById('fps').textContent=Math.round(1000/(now-lastT))+' FPS';
  lastT=now;
  if(video.readyState>=2){ analyze(); buildDensity(); drawScope(); }
  requestAnimationFrame(loop);
}

} catch(e) {
  /* Show error on screen for debugging on mobile */
  document.body.style.color='#f44';
  document.body.style.padding='40px 20px';
  document.body.style.fontSize='12px';
  document.body.style.overflow='auto';
  document.body.textContent='ERROR: '+e.message+'\n\n'+e.stack;
}
</script>

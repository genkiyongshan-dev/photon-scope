<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>WAVEFORM MONITOR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:#0d0d0d;overflow:hidden;font-family:'Space Mono',monospace}

  /* ── Start screen ── */
  #startScreen{
    position:fixed;top:36px;left:0;right:0;bottom:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;z-index:99;background:#0d0d0d;gap:14px;
  }
  #startBtn{
    background:transparent;border:1px solid rgba(255,255,255,.3);color:#fff;
    font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.35em;
    padding:18px 44px;cursor:pointer;
  }
  .sub{font-size:8px;letter-spacing:.3em;color:rgba(255,255,255,.2)}

  /* ── Source tab bar (top of app) ── */
  #sourceBar{
    position:fixed;top:0;left:0;right:0;height:36px;
    background:#161616;border-bottom:1px solid rgba(255,255,255,.08);
    display:flex;align-items:center;z-index:20;
  }
  .stab{
    flex:1;height:100%;background:transparent;border:none;
    color:rgba(255,255,255,.28);font-family:'Space Mono',monospace;
    font-size:9px;letter-spacing:.3em;cursor:pointer;text-transform:uppercase;
    border-bottom:2px solid transparent;
  }
  .stab.on{color:rgba(255,255,255,.85);border-bottom:2px solid rgba(255,255,255,.5)}

  /* ── Panels — JS sets top/height ── */
  #pvWrap{position:fixed;left:0;right:0;background:#000;overflow:hidden}
  #video{width:100%;height:100%;object-fit:cover;display:block}

  /* Photo preview — letterbox 16:9 */
  #photoWrap{
    position:fixed;left:0;right:0;background:#000;overflow:hidden;
    display:none;align-items:center;justify-content:center;
  }
  #photoImg{max-width:100%;max-height:100%;object-fit:contain;display:block}
  #photoDropzone{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:8px;cursor:pointer;
  }
  #photoDropzone.hidden{display:none}
  #fileInput{display:none}
  .dropIcon{font-size:28px;opacity:.35}
  .dropLabel{font-size:8px;letter-spacing:.3em;color:rgba(255,255,255,.3)}
  .dropBtn{
    margin-top:4px;background:transparent;border:1px solid rgba(255,255,255,.2);
    color:rgba(255,255,255,.5);font-family:'Space Mono',monospace;
    font-size:8px;letter-spacing:.25em;padding:8px 20px;cursor:pointer;
  }

  .pvLabel{position:absolute;top:8px;left:14px;font-size:8px;letter-spacing:.3em;color:rgba(255,255,255,.35)}
  .rec{position:absolute;top:11px;left:8px;width:5px;height:5px;border-radius:50%;
    background:#f02020;animation:blink 1.4s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}

  /* Photo change button */
  #changePhotoBtn{
    position:absolute;top:8px;right:8px;
    background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.2);
    color:rgba(255,255,255,.6);font-family:'Space Mono',monospace;
    font-size:7px;letter-spacing:.2em;padding:4px 10px;cursor:pointer;display:none;
  }

  /* ── Scope ── */
  #scopeWrap{position:fixed;left:0;right:0;background:#0d0d0d;overflow:hidden}
  .hdr{
    position:absolute;top:0;left:0;right:0;height:26px;
    background:#1a1a1a;border-bottom:1px solid rgba(255,255,255,.08);
    display:flex;align-items:center;padding:0 10px;z-index:5;
  }
  .hdrTitle{font-size:8px;letter-spacing:.28em;color:rgba(255,255,255,.5)}
  .modes{margin-left:auto;display:flex;gap:4px}
  .mb{
    background:transparent;border:none;color:rgba(255,255,255,.25);
    font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.28em;
    cursor:pointer;padding:3px 8px;text-transform:uppercase;border-radius:2px;
  }
  .mb.on{color:rgba(255,255,255,.9);background:rgba(255,255,255,.1)}
  #gc,#wc{position:absolute;top:26px;left:0}
  .yAxis{position:absolute;top:26px;left:0;width:34px;pointer-events:none;z-index:4}
  .yL{position:absolute;right:5px;font-size:7px;color:rgba(255,255,255,.3);transform:translateY(-50%)}
  .ftr{
    position:absolute;bottom:0;left:0;right:0;height:18px;
    display:flex;align-items:center;padding:0 10px;
    border-top:1px solid rgba(255,255,255,.05);z-index:4;
  }
  .ftrL{font-size:7px;letter-spacing:.3em;color:rgba(255,255,255,.2)}
  .ftrR{margin-left:auto;font-size:7px;letter-spacing:.2em;color:rgba(255,255,255,.12)}

  /* ── Controls ── */
  #controls{
    position:fixed;left:0;right:0;background:#111;
    border-top:1px solid rgba(255,255,255,.07);
    display:flex;flex-direction:column;justify-content:center;
    padding:10px 24px;gap:6px;
  }
  .ctrl-row{display:flex;flex-direction:column;gap:4px}
  .ctrl-head{display:flex;justify-content:space-between;align-items:baseline}
  .ctrl-name{font-size:8px;letter-spacing:.3em;color:rgba(255,255,255,.4)}
  .ctrl-val{font-size:12px;font-weight:700;letter-spacing:.05em;color:rgba(255,255,255,.75)}
  input[type=range]{
    width:100%;-webkit-appearance:none;appearance:none;
    height:3px;background:rgba(255,255,255,.18);border-radius:2px;outline:none;cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:22px;height:22px;border-radius:50%;
    background:#fff;cursor:pointer;box-shadow:0 0 8px rgba(255,255,255,.25);
  }
</style>
</head>
<body>

<div id="startScreen">
  <button id="startBtn">▶ START WAVEFORM</button>
  <div class="sub">FCP · RGB OVERLAY WAVEFORM MONITOR</div>
</div>

<!-- Source selector tab -->
<div id="sourceBar" style="display:flex">
  <button class="stab on" data-s="camera">◉ CAMERA</button>
  <button class="stab" data-s="photo">⊞ PHOTO</button>
</div>

<!-- Camera preview -->
<div id="pvWrap">
  <video id="video" autoplay playsinline muted></video>
  <div class="rec"></div>
  <div class="pvLabel">CAMERA INPUT</div>
</div>

<!-- Photo preview -->
<div id="photoWrap">
  <img id="photoImg" style="display:none">
  <div id="photoDropzone">
    <div class="dropIcon">⊞</div>
    <div class="dropLabel">PHOTO ANALYSIS</div>
    <button class="dropBtn" id="openFileBtn">SELECT IMAGE</button>
  </div>
  <button id="changePhotoBtn">CHANGE IMAGE</button>
  <input type="file" id="fileInput" accept="image/*">
</div>

<!-- Waveform scope -->
<div id="scopeWrap">
  <div class="hdr">
    <span class="hdrTitle" id="hdrTitle">RGB OVERLAY</span>
    <div class="modes">
      <button class="mb" data-m="luma">LUMA</button>
      <button class="mb on" data-m="rgb">RGB</button>
      <button class="mb" data-m="color">COLOR</button>
    </div>
  </div>
  <canvas id="gc"></canvas>
  <canvas id="wc"></canvas>
  <div class="yAxis" id="yAxis"></div>
  <div class="ftr">
    <span class="ftrL">Rec. 709</span>
    <span class="ftrR" id="fps"></span>
  </div>
</div>

<!-- Controls -->
<div id="controls">
  <div class="ctrl-row">
    <div class="ctrl-head">
      <span class="ctrl-name">GAIN</span>
      <span class="ctrl-val" id="gainVal">160</span>
    </div>
    <input type="range" id="gainSlider" min="20" max="800" value="160" step="5">
  </div>
  <div class="ctrl-row">
    <div class="ctrl-head">
      <span class="ctrl-name">DECAY</span>
      <span class="ctrl-val" id="decayVal">0.72</span>
    </div>
    <input type="range" id="decaySlider" min="0" max="97" value="72" step="1">

  </div>
</div>

<canvas id="ac" style="display:none"></canvas>

<script>
const video      = document.getElementById('video');
const photoImg   = document.getElementById('photoImg');
const photoWrap  = document.getElementById('photoWrap');
const pvWrap     = document.getElementById('pvWrap');
const ac         = document.getElementById('ac');
const gc         = document.getElementById('gc');
const wc         = document.getElementById('wc');
const gx         = gc.getContext('2d');
const wx         = wc.getContext('2d');
const ax         = ac.getContext('2d', {willReadFrequently:true});

const AH = 240;
let GAIN_NUMER = 160;
let DECAY = 0.72;
const PAD_T=8, PAD_B=22, PAD_L=34, PAD_R=4, HDR=26, TABH=36;

let mode='rgb', source='camera';
let running=false, photoLoaded=false;
let lastT=performance.now();
let W=0, H=0, pW=0, pH=0, AW=1;
let pxR, pxG, pxB, pxL;
let densR, densG, densB;
let persR, persG, persB;

// ── Sliders ───────────────────────────────────────────────
document.getElementById('gainSlider').addEventListener('input', function(){
  GAIN_NUMER = +this.value;
  document.getElementById('gainVal').textContent = this.value;
  clearPers();
  if(source==='photo' && photoLoaded) analyzePhoto();
});
document.getElementById('decaySlider').addEventListener('input', function(){
  DECAY = this.value / 100;
  document.getElementById('decayVal').textContent = DECAY.toFixed(2);
  clearPers();
  if(source==='photo' && photoLoaded) analyzePhoto();
});
function clearPers(){
  if(persR){ persR.fill(0); persG.fill(0); persB.fill(0); }
}

// ── Source tabs ───────────────────────────────────────────
document.querySelectorAll('.stab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.stab').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    source = btn.dataset.s;
    switchSource();
  });
});

function switchSource(){
  clearPers();
  if(source === 'camera'){
    pvWrap.style.display   = 'block';
    photoWrap.style.display= 'none';
    document.getElementById('fps').textContent = '';
    // resume live loop
    if(!running){ running=true; requestAnimationFrame(loop); }
  } else {
    pvWrap.style.display   = 'none';
    photoWrap.style.display= 'flex';
    running = false; // pause live loop
    if(photoLoaded) analyzePhoto();
  }
  layout();
}

// ── File picker ───────────────────────────────────────────
document.getElementById('openFileBtn').addEventListener('click',()=>{
  document.getElementById('fileInput').click();
});
document.getElementById('changePhotoBtn').addEventListener('click',()=>{
  document.getElementById('fileInput').click();
});
document.getElementById('fileInput').addEventListener('change', function(){
  if(!this.files || !this.files[0]) return;
  const url = URL.createObjectURL(this.files[0]);
  photoImg.onload = ()=>{
    photoLoaded = true;
    document.getElementById('photoDropzone').classList.add('hidden');
    photoImg.style.display = 'block';
    document.getElementById('changePhotoBtn').style.display = 'block';
    clearPers();
    analyzePhoto();
  };
  photoImg.src = url;
});

function analyzePhoto(){
  if(!photoLoaded || W===0) return;
  const DPR = window.devicePixelRatio || 1;
  const PW = Math.round(W*DPR), PH = Math.round(H*DPR);

  ax.fillStyle='#000';
  ax.fillRect(0,0,AW,AH);
  const iw = photoImg.naturalWidth;
  const ih = photoImg.naturalHeight;
  const scale = Math.min(AW/iw, AH/ih);
  const dw = iw*scale, dh = ih*scale;
  const dx = (AW-dw)/2, dy = (AH-dh)/2;
  ax.drawImage(photoImg, dx, dy, dw, dh);

  const d = ax.getImageData(0,0,AW,AH).data;
  for(let i=0;i<AW*AH;i++){
    const b=i*4;
    pxR[i]=d[b]; pxG[i]=d[b+1]; pxB[i]=d[b+2];
    pxL[i]=(d[b]*299+d[b+1]*587+d[b+2]*114+500)/1000|0;
  }
  densR.fill(0); densG.fill(0); densB.fill(0);
  buildDensity();
  persR.fill(0); persG.fill(0); persB.fill(0);
  const GAIN = GAIN_NUMER / AH;
  const sz = PW*PH;
  for(let pass=0; pass<80; pass++){
    for(let i=0;i<sz;i++){
      persR[i]=persR[i]*DECAY+densR[i]*GAIN;
      persG[i]=persG[i]*DECAY+densG[i]*GAIN;
      persB[i]=persB[i]*DECAY+densB[i]*GAIN;
    }
  }
  const imgData = new ImageData(PW,PH);
  const buf = imgData.data;
  for(let i=0;i<sz;i++){
    const b=i*4;
    buf[b]  =persR[i]>255?255:persR[i];
    buf[b+1]=persG[i]>255?255:persG[i];
    buf[b+2]=persB[i]>255?255:persB[i];
    buf[b+3]=255;
  }
  wx.putImageData(imgData,0,0);
}

// ── Layout ────────────────────────────────────────────────
function layout(){
  const SW = window.innerWidth;
  const SH = window.innerHeight;
  const panelH = Math.floor(SW * 9 / 16);
  const pvTop  = TABH;

  // Camera preview
  pvWrap.style.top    = pvTop + 'px';
  pvWrap.style.height = panelH + 'px';

  // Photo preview
  photoWrap.style.top    = pvTop + 'px';
  photoWrap.style.height = panelH + 'px';

  // Scope
  const scopeTop = pvTop + panelH;
  document.getElementById('scopeWrap').style.top    = scopeTop + 'px';
  document.getElementById('scopeWrap').style.height = panelH + 'px';

  // Controls
  const ctrlTop = scopeTop + panelH;
  const ctrlH   = SH - ctrlTop;
  const ctrl = document.getElementById('controls');
  ctrl.style.top    = ctrlTop + 'px';
  ctrl.style.height = Math.max(0, ctrlH) + 'px';
  ctrl.style.display = 'flex';

  resizeScope(SW, panelH);
}

function resizeScope(sw, sh){
  const DPR = window.devicePixelRatio || 1;
  W = sw; H = sh - HDR;
  if(W<=0||H<=0) return;
  pW = W - PAD_L - PAD_R;
  pH = H - PAD_T - PAD_B;

  // グリッドcanvasはDPR対応（スタイルサイズは論理px、実描画は物理px）
  gc.width = Math.round(W*DPR); gc.height = Math.round(H*DPR);
  gc.style.width = W+'px'; gc.style.height = H+'px';
  gx.scale(DPR, DPR);

  // 波形canvasもDPR対応（putImageDataは物理pxで書く）
  wc.width = Math.round(W*DPR); wc.height = Math.round(H*DPR);
  wc.style.width = W+'px'; wc.style.height = H+'px';

  AW = pW;
  ac.width=AW; ac.height=AH;
  const PW=Math.round(W*DPR), PH=Math.round(H*DPR);
  const sz=PW*PH;
  pxR=new Uint8Array(AW*AH); pxG=new Uint8Array(AW*AH);
  pxB=new Uint8Array(AW*AH); pxL=new Uint8Array(AW*AH);
  densR=new Float32Array(sz); densG=new Float32Array(sz); densB=new Float32Array(sz);
  persR=new Float32Array(sz); persG=new Float32Array(sz); persB=new Float32Array(sz);
  buildYAxis(); drawGrid();
  if(source==='photo' && photoLoaded) analyzePhoto();
}

function buildYAxis(){
  const el=document.getElementById('yAxis');
  el.innerHTML='';
  [100,75,50,25,0].forEach(v=>{
    const d=document.createElement('div');
    d.className='yL'; d.textContent=v;
    d.style.top=(PAD_T+(1-v/100)*pH)+'px';
    el.appendChild(d);
  });
}
function drawGrid(){
  gx.clearRect(0,0,W,H);
  gx.lineWidth=1;
  [0,25,50,75,100].forEach(v=>{
    const y=PAD_T+(1-v/100)*pH;
    gx.strokeStyle=(v===0||v===100)?'rgba(255,255,255,.1)':'rgba(255,255,255,.05)';
    gx.beginPath(); gx.moveTo(PAD_L,y); gx.lineTo(W-PAD_R,y); gx.stroke();
  });
}

function analyze(){
  ax.drawImage(video,0,0,AW,AH);
  const d=ax.getImageData(0,0,AW,AH).data;
  for(let i=0;i<AW*AH;i++){
    const b=i*4;
    pxR[i]=d[b]; pxG[i]=d[b+1]; pxB[i]=d[b+2];
    pxL[i]=(d[b]*299+d[b+1]*587+d[b+2]*114+500)/1000|0;
  }
}

function buildDensity(){
  const DPR = window.devicePixelRatio || 1;
  const PW = Math.round(W*DPR);  // 物理px幅
  const PH = Math.round(H*DPR);  // 物理px高さ
  const pPAD_L = Math.round(PAD_L*DPR);
  const pPAD_T = Math.round(PAD_T*DPR);
  const ppH    = Math.round(pH*DPR);

  densR.fill(0); densG.fill(0); densB.fill(0);
  for(let col=0;col<AW;col++){
    const outX = pPAD_L + Math.round(col*DPR);
    if(outX<0||outX>=PW) continue;
    for(let row=0;row<AH;row++){
      const idx=row*AW+col;
      if(mode==='luma'){
        const v=pxL[idx];
        const outY=Math.round(pPAD_T+(1-v/255)*ppH);
        if(outY>=0&&outY<PH){const i=outY*PW+outX; densR[i]+=0.75; densG[i]+=1.0; densB[i]+=0.55;}
      } else if(mode==='rgb'){
        let y;
        y=Math.round(pPAD_T+(1-pxR[idx]/255)*ppH); if(y>=0&&y<PH) densR[y*PW+outX]+=1.0;
        y=Math.round(pPAD_T+(1-pxG[idx]/255)*ppH); if(y>=0&&y<PH) densG[y*PW+outX]+=1.0;
        y=Math.round(pPAD_T+(1-pxB[idx]/255)*ppH); if(y>=0&&y<PH) densB[y*PW+outX]+=1.0;
      } else {
        const v=pxL[idx];
        const outY=Math.round(pPAD_T+(1-v/255)*ppH);
        if(outY>=0&&outY<PH){
          const i=outY*PW+outX;
          densR[i]+=pxR[idx]/255; densG[i]+=pxG[idx]/255; densB[i]+=pxB[idx]/255;
        }
      }
    }
  }
}

function drawScope(){
  if(!persR||W===0||H===0) return;
  const DPR = window.devicePixelRatio || 1;
  const PW = Math.round(W*DPR);
  const PH = Math.round(H*DPR);
  const GAIN=GAIN_NUMER/AH;
  const sz=PW*PH;
  const imgData=new ImageData(PW,PH);
  const buf=imgData.data;
  for(let i=0;i<sz;i++){
    persR[i]=persR[i]*DECAY+densR[i]*GAIN;
    persG[i]=persG[i]*DECAY+densG[i]*GAIN;
    persB[i]=persB[i]*DECAY+densB[i]*GAIN;
    const b=i*4;
    buf[b]  =persR[i]>255?255:persR[i];
    buf[b+1]=persG[i]>255?255:persG[i];
    buf[b+2]=persB[i]>255?255:persB[i];
    buf[b+3]=255;
  }
  wx.putImageData(imgData,0,0);
}

document.querySelectorAll('.mb').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.mb').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    mode=btn.dataset.m;
    document.getElementById('hdrTitle').textContent={luma:'LUMA',rgb:'RGB OVERLAY',color:'COLOR'}[mode];
    clearPers();
    if(source==='photo' && photoLoaded) analyzePhoto();
  });
});

// ── Start ─────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', async()=>{
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},
      audio:false
    });
    video.srcObject=stream;
    video.onloadedmetadata=()=>{
      video.play().then(()=>{
        document.getElementById('startScreen').style.display='none';
        layout();
        running=true;
        requestAnimationFrame(loop);
      });
    };
  } catch(e){
    document.querySelector('.sub').textContent='カメラを許可してください';
  }
});

window.addEventListener('resize', layout);

function loop(){
  if(!running||source!=='camera') return;
  const now=performance.now();
  document.getElementById('fps').textContent=Math.round(1000/(now-lastT))+' FPS';
  lastT=now;
  if(video.readyState>=2){ analyze(); buildDensity(); drawScope(); }
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
